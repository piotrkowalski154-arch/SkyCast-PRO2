<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyCast PRO | Myśl Piotrka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 50%, #f1f5f9 100%);
            --glass: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 1);
            --text: #0f172a;
            --main-title: #020617;
            --blue: #2563eb;
            --green: #16a34a;
            --red: #ef4444;
            --purple: #7e22ce;
            --orange: #f59e0b;
            --card-text: #1e293b;
        }
        body.night-mode {
            --bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
            --main-title: #f8fafc;
            --blue: #3b82f6;
            --purple: #c084fc;
            --card-text: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; padding: 10px; color: var(--text); overflow-x: hidden; transition: background 1s ease; }
        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .anim-float { display: inline-block; animation: float 3s ease-in-out infinite; }
        .anim-spin { display: inline-block; animation: spin 8s linear infinite; }
        .anim-bounce { display: inline-block; animation: bounce 1.2s ease-in-out infinite; }
        .animate { animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        .search-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 16px 20px; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass); backdrop-filter: blur(10px); font-size: 1rem; font-weight: 700; outline: none; color: var(--text); }
        button { padding: 0 20px; border-radius: 20px; border: none; background: var(--blue); color: white; font-weight: 900; cursor: pointer; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 22px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        .main-hero { text-align: center; }
        .cityName { font-size: 2.6rem; font-weight: 900; color: var(--main-title); }
        .temp { font-size: 6.5rem; font-weight: 900; letter-spacing: -5px; color: var(--main-title); }
        .hero-icon { font-size: 5rem; }
        .label { font-size: 0.8rem; font-weight: 900; text-transform: uppercase; color: #94a3b8; margin-bottom: 12px; display: block; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px; }
        .d-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(150,150,150,0.1); }
        .d-day { font-size: 1.2rem; font-weight: 800; text-transform: capitalize; flex: 1; }
        .d-icon { font-size: 2.2rem; width: 60px; text-align: center; }
        .d-temp { font-size: 1.6rem; font-weight: 900; width: 80px; text-align: right; color: var(--blue); }
        .h-scroll { display: flex; overflow-x: auto; gap: 12px; }
        .h-box { min-width: 85px; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 15px 5px; border-radius: 22px; }
        .manifest { background: rgba(0,0,0,0.9); color: white; border-radius: 30px; padding: 25px; }
        .thesis-card { border-left: 6px solid var(--blue); background: rgba(37, 99, 235, 0.05); }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-area animate">
            <input type="text" id="cityIn" placeholder="Skanuj miasto..." value="Kraków">
            <button onclick="pobierzDane()">SKANUJ</button>
        </div>

        <div class="card main-hero animate">
            <div id="modeIndicator" style="font-size: 0.7rem; font-weight: 900; color: var(--purple); text-transform: uppercase;">Inicjalizacja...</div>
            <div class="cityName" id="cityName">Kraków</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <div class="temp" id="valT">--°</div>
                <div class="hero-icon" id="mainIcon"></div>
            </div>
            <div id="valD" style="font-size: 1.3rem; font-weight: 700; color: var(--purple); text-transform: capitalize;">Ładowanie...</div>
            <div class="imgw-badge" id="imgwTag">📡 Silnik gotowy</div>
        </div>

        <div class="card thesis-card animate" id="thesisWidget" style="display: none;">
            <h4>🧠 Myśl Piotrka</h4>
            <p id="thesisP">Przetwarzam dane...</p>
        </div>

        <div class="card animate" id="hourlyCard" style="display: none;">
            <span class="label">Skan Godzinowy</span>
            <div class="h-scroll" id="hList"></div>
        </div>

        <div class="card animate" id="dailyCard" style="display: none;">
            <span class="label">Prognoza na 5 dni</span>
            <div id="dList"></div>
        </div>

        <div class="card manifest animate">
            <h2 style="font-size: 1.2rem; font-weight: 900;">Piotrek | SkyCast PRO👷</h2>
            <p style="font-size: 0.9rem; opacity: 0.8;">Fuzja pasji do pizzy, cyberbezpieczeństwa i kodu.</p>
        </div>
    </div>

    <script>
        // 🔊 SILNIK AUDIO
        let skyAudio = new Audio();

        function grajPogode(warunki, godzina) {
            skyAudio.pause();
            skyAudio.currentTime = 0;
            let w = warunki.toLowerCase();
            
            if (godzina >= 20 || godzina < 6) {
                skyAudio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-crickets-and-insects-in-the-wild-ambience-39.mp3';
            } else if (w.includes('rain') || w.includes('drizzle')) {
                skyAudio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-rain-and-thunder-storm-2390.mp3';
            } else if (w.includes('thunder')) {
                skyAudio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-thunder-rumble-2331.mp3';
            } else {
                skyAudio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-forest-birds-ambience-1210.mp3';
            }
            skyAudio.play().catch(e => console.log("Audio block bypass active."));
        }
    </script>

    <script>
        // 🧠 LOGIKA GŁÓWNA (APK)
        const API_KEY = '6def6302b0a9b722144968390f4b8522'; 

        async function pobierzDane() {
            // 🔊 KOPNIAK DLA AUDIO (Odblokowanie głośnika)
            skyAudio.play().then(() => {
                skyAudio.pause();
                skyAudio.currentTime = 0;
            }).catch(e => console.log("Bypass prep."));

            let miastoInput = document.getElementById('cityIn').value;
            if(!miastoInput) return;
            const tlumacz = { "kijów": "Kyiv", "rzym": "Rome", "wrocław": "Wroclaw", "kraków": "Krakow" };
            const miastoDoAPI = tlumacz[miastoInput.toLowerCase().trim()] || miastoInput;

            try {
                const resF = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(miastoDoAPI)}&appid=${API_KEY}&units=metric&lang=pl`);
                const dataF = await resF.json();
                if(dataF.cod === "200") renderUI(dataF);
            } catch (err) { console.log("Błąd silnika."); }
        }

        function getAnimatedIcon(weatherMain, hour) {
            const w = weatherMain.toLowerCase();
            const isNight = hour >= 20 || hour < 6;
            if (w.includes('clear')) return isNight ? '<span class="anim-float">🌙</span>' : '<span class="anim-spin">☀️</span>';
            if (w.includes('cloud')) return isNight ? '<span class="anim-float">☁️</span>' : '<span class="anim-float">⛅</span>';
            if (w.includes('rain')) return '<span class="anim-bounce">🌧️</span>';
            return '<span class="anim-float">🌤️</span>';
        }

        function renderUI(f) {
            const teraz = f.list[0];
            const currentHour = new Date().getHours();
            
            if (currentHour >= 20 || currentHour < 6) document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');

            document.getElementById('cityName').innerText = f.city.name;
            document.getElementById('valT').innerText = `${Math.round(teraz.main.temp)}°`;
            document.getElementById('mainIcon').innerHTML = getAnimatedIcon(teraz.weather[0].main, currentHour);
            document.getElementById('valD').innerText = teraz.weather[0].description;

            document.getElementById('thesisWidget').style.display = 'block';
            let mysl = "Idealne warunki na testy. Czyste niebo!";
            if(teraz.main.temp > 25) mysl = "Upał! Chłodź procesor i pij dużo wody. 🌊";
            else if(teraz.weather[0].main.toLowerCase().includes('rain')) mysl = "Pada... idealny czas na kodowanie. ☕";
            document.getElementById('thesisP').innerText = mysl;

            document.getElementById('hourlyCard').style.display = 'block';
            const hL = document.getElementById('hList'); hL.innerHTML = '';
            for(let i=0; i<8; i++) {
                const h = f.list[i]; const hHour = new Date(h.dt*1000).getHours();
                hL.innerHTML += `<div class="h-box"><span>${hHour}:00</span>${getAnimatedIcon(h.weather[0].main, hHour)}<strong>${Math.round(h.main.temp)}°</strong></div>`;
            }

            document.getElementById('dailyCard').style.display = 'block';
            const dL = document.getElementById('dList'); dL.innerHTML = '';
            for(let i=7; i<f.list.length; i+=8) {
                const d = f.list[i]; const n = new Date(d.dt*1000).toLocaleDateString('pl-PL', {weekday:'long'});
                dL.innerHTML += `<div class="d-row"><strong class="d-day">${n}</strong><span class="d-icon">${getAnimatedIcon(d.weather[0].main, 12)}</span><span class="d-temp">${Math.round(d.main.temp)}°</span></div>`;
            }

            // ODPALENIE DŹWIĘKU
            grajPogode(teraz.weather[0].main, currentHour);
        }

        window.onload = pobierzDane;
    </script>
</body>
</html>
