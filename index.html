<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO - Oprawa Mistrzowska</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'weather-bg': '#F9FAFB',
                        'weather-text': '#1F2937',
                        'weather-mint': '#2DD4BF',
                        'weather-accent': '#99F6E4',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;800&display=swap');
        body { background-color: #F9FAFB; font-family: 'Urbanist', sans-serif; color: #1F2937; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        .location-bar { background: white; border-radius: 999px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.03); }
        .warning-overlay { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-md mt-2 flex items-center justify-center relative mb-6">
        <h1 class="text-3xl font-extrabold italic tracking-tighter text-slate-800">SKYCAST <span class="text-teal-500">PRO</span></h1>
    </div>

    <div class="w-full max-w-md location-bar flex items-center p-1 mb-8">
        <span class="text-teal-400 text-xl pl-4 pr-3">📍</span>
        <input id="city-input" type="text" placeholder="Szukaj miasta na świecie..." class="flex-grow p-3 bg-transparent outline-none text-sm font-semibold placeholder:text-slate-400 text-slate-800">
        <button onclick="searchWorld()" class="bg-teal-400 hover:bg-teal-500 text-white p-3 rounded-full flex items-center justify-center transition-all">
            🔍
        </button>
    </div>

    <div id="warning-card" class="w-full max-w-md rounded-full warning-overlay p-6 flex items-center justify-center gap-4 mb-8 text-center shadow-xl shadow-slate-100 hidden">
        <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center text-4xl text-red-500">
            🔔
        </div>
        <div>
            <h3 class="font-bold text-red-700 tracking-tight text-sm">UWAGA: NIEBEZPIECZEŃSTWO</h3>
            <p id="alert-status" class="text-xs text-red-600 font-medium leading-relaxed uppercase tracking-widest mt-1">Skanowanie zagrożeń dla wybranej strefy...</p>
        </div>
    </div>

    <div class="w-full max-w-md glass-card p-10 flex flex-col items-center text-center mb-8 relative">
        
        <div id="location-name" class="text-[10px] text-teal-600 font-black uppercase tracking-[0.3em] mb-4">Namierzanie GPS...</div>
        
        <div class="text-9xl mb-3">☀️</div>
        
        <div id="temp" class="text-8xl font-black text-slate-900 tracking-tighter drop-shadow-sm mb-1">--°</div>
        <div id="description" class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-2">Czekam na dane</div>
        <div id="current-time" class="text-[10px] text-slate-400 font-medium">--:--:-- | --/--</div>
    </div>

    <div class="w-full max-w-md glass-card p-8 grid grid-cols-3 gap-6 mb-8 text-center">
        <div>
            <div class="text-[9px] text-slate-400 uppercase font-black mb-1 tracking-widest">Zachmurzenie</div>
            <div id="cloud-cover" class="text-2xl font-black text-teal-600">--%</div>
        </div>
        <div>
            <div class="text-[9px] text-slate-400 uppercase font-black mb-1 tracking-widest">Opady</div>
            <div id="precipitation" class="text-2xl font-black text-teal-600">--%</div>
        </div>
        <div>
            <div class="text-[9px] text-slate-400 uppercase font-black mb-1 tracking-widest">Wiatr</div>
            <div id="wind" class="text-2xl font-black text-teal-600">-- <span class="text-[10px] font-bold">km/h</span></div>
        </div>
    </div>

    <div class="w-full max-w-md glass-card p-6 mb-10 overflow-x-auto">
        <div class="flex items-center gap-6 text-center">
            <div class="flex-shrink-0">
                <p class="text-[10px] text-slate-400 font-bold mb-1">Teraz</p>
                <p class="text-xl">☀️</p>
                <p class="text-sm font-bold text-slate-800">--°</p>
            </div>
            <div class="flex-shrink-0">
                <p class="text-[10px] text-slate-400 font-bold mb-1">14:00</p>
                <p class="text-xl">☀️</p>
                <p class="text-sm font-bold text-slate-800">--°</p>
            </div>
            <div class="flex-shrink-0">
                <p class="text-[10px] text-slate-400 font-bold mb-1">15:00</p>
                <p class="text-xl">☀️</p>
                <p class="text-sm font-bold text-slate-800">--°</p>
            </div>
            <div class="flex-shrink-0">
                <p class="text-[10px] text-slate-400 font-bold mb-1">16:00</p>
                <p class="text-xl">⛅</p>
                <p class="text-sm font-bold text-slate-800">--°</p>
            </div>
        </div>
    </div>

    <footer class="mt-auto pb-6 text-center">
        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.3em]">Architekt: Piotrek • Lucky Smart Engine V3</p>
    </footer>

    <script>
        async function fetchWeather(lat, lon, name = "Twoja Lokalizacja") {
            try {
                // Nowe API pobiera więcej szczegółów (Zachmurzenie, Opady, Godziny)
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,cloud_cover,wind_speed_10m&hourly=temperature_2m,weather_code&timezone=auto`);
                const data = await res.json();
                
                const current = data.current;
                const temp = Math.round(current.temperature_2m);
                const wind = current.wind_speed_10m;
                const cloud = current.cloud_cover;
                const precip = current.precipitation;

                // Aktualizacja głównego panelu
                document.getElementById('temp').innerText = temp + "°";
                document.getElementById('description').innerText = "System Sentinel Czuwa";
                document.getElementById('location-name').innerText = name;
                
                // Aktualizacja panelu szczegółów (Zunifikowany design)
                document.getElementById('cloud-cover').innerText = cloud + "%";
                document.getElementById('precipitation').innerText = Math.round(precip) + "%";
                document.getElementById('wind').innerText = wind + " km/h";

                // LOGIKA ALERTÓW (Okrągły panel z Foto 2)
                const warningCard = document.getElementById('warning-card');
                const alertStatus = document.getElementById('alert-status');

                if (wind > 25 || temp > 30) {
                    warningCard.classList.remove('hidden');
                    alertStatus.innerText = "🛑 UWAGA: SILNY WIATR / UPAŁ - ZACHOWAJ OSTROŻNOŚĆ";
                } else {
                    warningCard.classList.add('hidden');
                }

                // Czas i Data
                const now = new Date();
                document.getElementById('current-time').innerText = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')} | ${now.getDate()}/${now.getMonth() + 1}`;

            } catch (e) { console.error("Błąd API"); }
        }

        async function searchWorld() {
            const city = document.getElementById('city-input').value;
            if (!city) return;
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=pl&format=json`);
            const geoData = await geoRes.json();
            if (geoData.results) {
                const { latitude, longitude, name, country } = geoData.results[0];
                fetchWeather(latitude, longitude, `${name}, ${country}`);
            }
        }

        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => fetchWeather(p.coords.latitude, p.coords.longitude));
            }
        };
    </script>
</body>
</html>
