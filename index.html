<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO | Architekt: Piotrek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1e293b;
            --text-muted: #475569;
            --accent-blue: #2563eb;
            --accent-pink: #ec4899;
            --rain-color: rgba(37, 99, 235, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(-45deg, #e0f2fe, #bae6fd, #7dd3fc, #fdf4ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dashboard-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(31, 38, 135, 0.1);
            position: relative;
            overflow: hidden;
        }

        .glass-panel:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(31, 38, 135, 0.15);
        }

        /* Demo Controller - ukryty panel */
        .demo-controls {
            display: none;
            position: fixed;
            top: 10px; right: 10px;
            background: var(--glass-bg);
            padding: 10px; border-radius: 15px;
            border: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .demo-controls button {
            padding: 5px 10px; margin: 2px;
            border: none; border-radius: 8px;
            background: #fff; cursor: pointer;
        }

        /* Główny Panel */
        .main-weather-panel {
            text-align: center;
        }

        .arch-header {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .big-temp {
            font-size: 6.5rem;
            font-weight: 900;
            letter-spacing: -5px;
            margin: 15px 0;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .condition-desc {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--accent-blue);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Siatka parametrów */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-card {
            padding: 25px 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .icon-box {
            width: 50px; height: 50px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: white;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 900;
        }

        /* Sekcja Wskazówki Piotrka */
        .architect-tip {
            display: flex; gap: 20px; align-items: center;
            border-left: 5px solid var(--accent-pink);
        }

        .avatar {
            font-size: 2.2rem;
            background: rgba(255,255,255,0.7);
            width: 60px; height: 60px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .tip-content h4 {
            color: var(--accent-pink);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .tip-content p {
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* NOWA SEKCJA: Moja Droga IT */
        .about-section {
            display: flex; flex-direction: column; gap: 15px;
            background: var(--text-main);
            color: white;
            padding: 35px;
        }

        .about-header {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
        }

        .about-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 5px 0;
            color: #fff;
        }

        .about-text {
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
        }

        .about-text strong {
            font-weight: 700;
            color: var(--accent-blue);
        }

        /* ----------------------------------------------------
           INTERAKTYWNE ANIMACJE - CSS CONDITIONS
        ---------------------------------------------------- */

        /* GŁÓWNA NAKŁADKA DESZCZU */
        .rain-overlay {
            display: none; /* Domyślnie wyłączona */
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            z-index: 1;
        }

        .rain-drop {
            position: absolute;
            background: var(--rain-color);
            width: 2px; height: 10px;
            border-radius: 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* NAKŁADKA BURZY (BŁYSKI) */
        .storm-overlay {
            display: none; /* Domyślnie wyłączona */
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 0;
            animation: flash 4s linear infinite;
        }

        @keyframes flash {
            0%, 90%, 100% { background: rgba(0,0,0,0.3); }
            92%, 96% { background: rgba(255,255,255,0.6); }
        }

        /* ANIMACJA WIATRU (KOŁYSANIE) */
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* AKTYWACJA ANIMACJI PRZEZ KLASY */

        /* Stan Deszcz: body.is-rain */
        body.is-rain .rain-overlay { display: block; }
        body.is-rain .main-weather-panel { border-color: #2563eb; }

        /* Stan Burza: body.is-storm */
        body.is-storm .storm-overlay { display: block; }
        body.is-storm .rain-overlay { display: block; } /* Też pada przy burzy */
        body.is-storm #conditionLabel { color: #fff; }
        body.is-storm #conditionDescSpan { color: #fff; }
        body.is-storm .big-temp { -webkit-text-fill-color: #fff; }
        body.is-storm .main-weather-panel { background: rgba(0,0,0,0.6); backdrop-filter: blur(40px); }

        /* Stan Wiatr: body.is-wind */
        body.is-wind #windIcon { animation: sway 1s ease-in-out infinite; }

    </style>
</head>
<body id="mainBody">

    <div class="demo-controls" id="demoPanel">
        <b>DEMO:</b>
        <button onclick="setWeather('sun')">Słońce</button>
        <button onclick="setWeather('rain')">Deszcz</button>
        <button onclick="setWeather('storm')">Burza</button>
        <button onclick="toggleWind()">💨 Wiatr</button>
    </div>

    <div class="dashboard-container">
        
        <div class="glass-panel main-weather-panel">
            <div class="rain-overlay" id="rainLayer">
                </div>
            <div class="storm-overlay"></div>

            <div style="position: relative; z-index: 2;">
                <div class="arch-header" id="conditionLabel" onclick="toggleDemoPanel()">
                    Architekt: Piotrek • Kraków
                </div>
                <div class="big-temp">21°C</div>
                <div class="condition-desc">
                    ☀️ <span id="conditionDescSpan">Bezchmurnie</span>
                </div>
                <div style="margin-top: 15px; font-size: 0.95rem; font-weight: 700;">
                    <span style="color: #ef4444;">↑ Max 21°C</span>
                    <span style="color: #3b82f6; margin-left: 15px;">↓ Min 12°C</span>
                </div>
            </div>
        </div>
