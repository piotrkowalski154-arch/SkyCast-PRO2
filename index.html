<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyCast PRO | Fuzja Ostateczna</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 50%, #f1f5f9 100%);
            --glass: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 1);
            --text: #0f172a;
            --blue: #2563eb;
            --green: #16a34a;
            --red: #ef4444;
            --purple: #7e22ce;
            --orange: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); background-attachment: fixed; min-height: 100vh; display: flex; justify-content: center; padding: 10px; color: var(--text); overflow-x: hidden; }
        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 10px; }

        /* ANIMACJE */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseAlert { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .anim-float { display: inline-block; animation: float 3s ease-in-out infinite; }
        .anim-spin { display: inline-block; animation: spin 8s linear infinite; }
        .animate { animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        .alert-active { animation: pulseAlert 2s infinite; }

        /* INTERFEJS */
        .search-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 16px 20px; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass); backdrop-filter: blur(10px); font-size: 1rem; font-weight: 700; outline: none; }
        button { padding: 0 20px; border-radius: 20px; border: none; background: var(--blue); color: white; font-weight: 900; cursor: pointer; }
        button:disabled { background: #94a3b8; }

        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 22px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02); }
        .main-hero { text-align: center; padding: 25px 10px; }
        .cityName { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
        .temp { font-size: 7rem; font-weight: 900; letter-spacing: -5px; }
        .hero-icon { font-size: 5rem; }
        .desc { font-size: 1.3rem; font-weight: 700; color: var(--purple); text-transform: capitalize; }
        
        .imgw-badge { display: inline-block; background: #f1f5f9; padding: 6px 14px; border-radius: 12px; font-size: 0.7rem; font-weight: 900; margin-top: 10px; }
        .alert-card { border-left: 6px solid; padding: 15px 22px; display: none; }
        
        /* SKROL I DNI */
        .scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 5px; }
        .scroll::-webkit-scrollbar { display: none; }
        .h-box { min-width: 80px; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.4); padding: 15px 5px; border-radius: 20px; }
        .d-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .manifest { background: #000; color: #fff; border-radius: 30px; padding: 25px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-area animate" style="animation-delay: 0.1s">
            <input type="text" id="cityIn" placeholder="Skanuj miasto..." value="Kraków">
            <button id="searchBtn" onclick="pobierzDane()">SKANUJ</button>
        </div>

        <div class="card main-hero animate" style="animation-delay: 0.2s">
            <div id="cityName" class="cityName">Kraków</div>
            <div id="currentDate" style="font-weight:700; color:#64748b; margin-bottom:10px;">--</div>
            <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
                <div id="valT" class="temp">--°</div>
                <div id="mainIcon" class="hero-icon">🌤️</div>
            </div>
            <div id="valD" class="desc">Oczekuję na cel...</div>
            <div id="imgwTag" class="imgw-badge">📡 System Gotowy</div>
        </div>

        <div class="card alert-card animate" id="alertWidget">
            <div style="font-size:0.7rem; font-weight:900; text-transform:uppercase; margin-bottom:5px;">🚨 Alerty Meteo</div>
            <div id="alertContent" style="font-weight:800;">Skanowanie...</div>
        </div>

        <div class="card animate" id="hourlyCard" style="display:none;">
            <span style="font-size:0.7rem; font-weight:900; color:#94a3b8; text-transform:uppercase;">Skan Godzinowy</span>
            <div class="scroll" id="hList"></div>
        </div>

        <div class="card animate" id="dailyCard" style="display:none;">
            <span style="font-size:0.7rem; font-weight:900; color:#94a3b8; text-transform:uppercase;">Prognoza 5-dniowa</span>
            <div id="dList"></div>
        </div>

        <div class="card manifest animate">
            <h2 style="font-weight:900; margin-bottom:10px;">Piotrek | 👷</h2>
            <p style="font-size:0.9rem; opacity:0.8;">Za dnia pizza, po nocach kod . SkyCast PRO to mój autorski silnik danych. Mam nadzieje 
            ze spełni wasze oczekiwania <\p>
        
        </div\>
    </div>

    <script>
        const API_KEY = '6def6302b0a9b722144968390f4b8522'; 

        async function pobierzDane() {
            let miastoInput = document.getElementById('cityIn').value;
            if(!miastoInput) return;

            // --- 🛡️ MODUŁ TŁUMACZA (Fix Kijowa) ---
            const tlumacz = { "kijów": "Kyiv", "rzym": "Rome", "paryż": "Paris" };
            const sprawdz = miastoInput.toLowerCase().trim();
            if(tlumacz[sprawdz]) miastoInput = tlumacz[sprawdz];

            const btn = document.getElementById('searchBtn');
            btn.innerText = "ŁADOWANIE..."; btn.disabled = true;

            try {
                const resF = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${miastoInput}&appid=${API_KEY}&units=metric&lang=pl`);
                const dataF = await resF.json();

                if(dataF.cod === "200") {
                    renderUI(dataF);
                    if(dataF.city.country === "PL") pobierzIMGW(miastoInput);
                } else {
                    alert("Nie znaleziono miasta.");
                }
            } catch (err) { alert("Błąd systemu."); }
            finally { btn.innerText = "SKANUJ"; btn.disabled = false; }
        }

        function renderUI(f) {
            const teraz = f.list[0];
            document.getElementById('cityName').innerText = f.city.name;
            document.getElementById('valT').innerText = Math.round(teraz.main.temp) + "°";
            document.getElementById('valD').innerText = teraz.weather[0].description;
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('pl-PL', {weekday:'long', day:'numeric', month:'long'});

            // Alerty
            const alertW = document.getElementById('alertWidget');
            alertW.style.display = 'block';
            alertW.style.borderLeftColor = 'var(--green)';
            document.getElementById('alertContent').innerText = "✅ Brak zagrożeń w strefie.";
            document.getElementById('alertContent').style.color = "var(--green)";

            // Godziny i Dni
            document.getElementById('hourlyCard').style.display = 'block';
            document.getElementById('dailyCard').style.display = 'block';
            
            const hL = document.getElementById('hList'); hL.innerHTML = '';
            for(let i=0; i<8; i++) {
                const h = f.list[i];
                hL.innerHTML += `<div class="h-box"><span style="font-size:0.7rem; opacity:0.6">${new Date(h.dt*1000).getHours()}:00</span><span>🌤️</span><strong>${Math.round(h.main.temp)}°</strong></div>`;
            }

            const dL = document.getElementById('dList'); dL.innerHTML = '';
            for(let i=7; i<f.list.length; i+=8) {
                const d = f.list[i];
                dL.innerHTML += `<div class="d-row"><strong>${new Date(d.dt*1000).toLocaleDateString('pl-PL', {weekday:'long'})}</strong><span>${Math.round(d.main.temp)}°</span></div>`;
            }
        }

        async function pobierzIMGW(m) {
            const tag = document.getElementById('imgwTag');
            tag.innerHTML = "🌍 Silnik: Globalny + IMGW";
        }
    </script>
</body>
</html>
