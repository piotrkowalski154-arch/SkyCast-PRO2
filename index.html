<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO | Architekt: Piotrek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Mocniejszy niebieski gradient, żeby nie było "białego tła" */
            --bg-gradient: linear-gradient(160deg, #3b82f6 0%, #93c5fd 50%, #dbeafe 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-dark: #0f172a;
            --text-muted: #475569;
            --accent-pink: #db2777;
            --accent-blue: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Wyszukiwarka */
        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            border: 2px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            font-size: 1rem;
            font-weight: 600;
            outline: none;
        }

        button {
            padding: 0 20px;
            border-radius: 20px;
            border: none;
            background: var(--text-dark);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Kafelki Glassmorphism */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        /* Główny kafelek */
        .main-card { text-align: center; }
        .main-card h2 { font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 2px; }
        .temp-big { font-size: 5rem; font-weight: 900; margin: 10px 0; letter-spacing: -3px; }
        .condition { font-size: 1.2rem; font-weight: 700; color: var(--accent-blue); }

        /* Siatka kafelków */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mini-card { display: flex; flex-direction: column; gap: 10px; }
        .icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; }

        .mini-card h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        .mini-card .value { font-size: 1.4rem; font-weight: 900; }

        /* Wskazówka Architekta */
        .tip-card { display: flex; gap: 15px; align-items: flex-start; }
        .tip-icon { font-size: 2rem; background: #fff; padding: 10px; border-radius: 15px; }
        .tip-card h4 { color: var(--accent-pink); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .tip-card p { font-size: 0.95rem; line-height: 1.4; }

        /* Animacja kafelka alertu */
        .alert-anim { border: 2px solid #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="search-box">
            <input type="text" id="citySearch" placeholder="Szukaj miasta (np. Kraków)...">
            <button onclick="startSkanowanie()">GO</button>
        </div>

        <div class="card main-card">
            <h2 id="displayCity">Temperatura - Kraków</h2>
            <div class="temp-big" id="currentTemp">21°C</div>
            <div class="condition" id="currentDesc">🌤️ Lekki deszcz</div>
            <div style="margin-top: 15px; color: var(--text-muted); font-weight: 700;">
                <span style="color: #ef4444;">↑ Max 21°C</span> &nbsp; 
                <span style="color: #2563eb;">↓ Min 12°C</span>
            </div>
        </div>

        <div class="grid">
            <div class="card mini-card">
                <div class="icon" style="background: #60a5fa;">💧</div>
                <h3>Opady (Dzień)</h3>
                <div class="value">35%</div>
            </div>
            <div class="card mini-card alert-anim">
                <div class="icon" style="background: #a78bfa;">☂️</div>
                <h3>Opady (Wieczór)</h3>
                <div class="value">65%</div>
            </div>
            <div class="card mini-card">
                <div class="icon" style="background: #2dd4bf;">💨</div>
                <h3>Wiatr</h3>
                <div class="value">12 mph</div>
            </div>
            <div class="card mini-card">
                <div class="icon" style="background: #fb923c;">☀️</div>
                <h3>Stan</h3>
                <div class="value">Słonecznie</div>
            </div>
        </div>

        <div class="card tip-card">
            <div class="tip-icon">🛡️</div>
            <div>
                <h4>✨ Wskazówka od Architekta</h4>
                <p>Kamila, weź dziś parasol – mój system wykrył <strong>65% szansy na deszcz</strong> wieczorem! Zadbam o to, żebyś nie zmokła. 😉</p>
            </div>
        </div>

    </div>

    <script>
        // Piotrek, tutaj wpisz swój klucz API z OpenWeatherMap
        const MY_KEY = 'TWÓJ_KLUCZ_API';

        async function startSkanowanie() {
            const city = document.getElementById('citySearch').value;
            if(!city) return;

            document.getElementById('displayCity').innerText = `Skanowanie: ${city}...`;

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${MY_KEY}&units=metric&lang=pl`);
                const data = await response.json();

                if(data.cod === 200) {
                    document.getElementById('displayCity').innerText = `Temperatura - ${data.name}`;
                    document.getElementById('currentTemp').innerText = `${Math.round(data.main.temp)}°C`;
                    document.getElementById('currentDesc').innerText = `📍 ${data.weather[0].description}`;
                } else {
                    alert("Nie znalazłem takiego miasta, bracie.");
                }
            } catch (err) {
                console.log("Błąd API. Sprawdź klucz lub połączenie.");
            }
        }
    </script>
</body>
</html>
