<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO</title>
    <style>
        :root {
            --bg-color: #121212;
            --tile-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #00e5ff;
            --alert: #ff4757;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(90deg, var(--accent), #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input {
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--text-muted);
            background: transparent;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            width: 250px;
        }

        button {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Nowoczesny układ kafelkowy */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .tile {
            background: var(--tile-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.1);
        }

        .tile-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .tile-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        /* Animacje statusów */
        .alert-active {
            border: 2px solid var(--alert);
            animation: pulse-alert 2s infinite;
        }

        .rain-active {
            border: 1px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        .rain-active::after {
            content: '';
            position: absolute;
            top: -50%;
            left: 0;
            width: 100%;
            height: 200%;
            background: linear-gradient(to bottom, rgba(0,229,255,0) 0%, rgba(0,229,255,0.1) 50%, rgba(0,229,255,0) 100%);
            animation: rain-fall 1.5s linear infinite;
        }

        @keyframes pulse-alert {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        @keyframes rain-fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(50%); }
        }

    </style>
</head>
<body>

    <header>
        <h1>SkyCast PRO</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Wpisz miasto (np. Kraków)">
            <button onclick="fetchWeatherData()">Skanuj</button>
        </div>
    </header>

    <div class="dashboard" id="weatherDashboard">
        <div class="tile">
            <div class="tile-title">Status</div>
            <div class="tile-value" style="font-size: 1.2rem;">Oczekuję na dane...</div>
        </div>
    </div>

    <script>
        // Tutaj wklej swój klucz API (np. z OpenWeatherMap lub IMGW)
        const API_KEY = 'TWÓJ_KLUCZ_API'; 

        async function fetchWeatherData() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return;

            // OPCJA 1: Wymuszanie lokalizacji w Polsce
            // Doklejamy ",PL", aby odciąć zagraniczne duplikaty nazw miast
            const queryLocation = `${city},PL`;
            
            const dashboard = document.getElementById('weatherDashboard');
            dashboard.innerHTML = `<div class="tile"><div class="tile-value" style="font-size: 1.2rem;">Skanowanie atmosfery...</div></div>`;

            try {
                // Przykładowy endpoint OpenWeatherMap (zmień URL jeśli używasz innego API)
                // Wymuszamy jednostki metryczne (Celsius) i język polski
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${queryLocation}&appid=${API_KEY}&units=metric&lang=pl`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Nie znaleziono miasta lub błąd API');
                
                const data = await response.json();
                
                updateDashboard(data);
            } catch (error) {
                dashboard.innerHTML = `
                    <div class="tile alert-active">
                        <div class="tile-title">Błąd Skanera</div>
                        <div class="tile-value" style="font-size: 1.5rem; color: #ff4757;">${error.message}</div>
                    </div>`;
            }
        }

        function updateDashboard(data) {
            const dashboard = document.getElementById('weatherDashboard');
            
            // Pobieranie kluczowych danych
            const temp = Math.round(data.main.temp);
            const description = data.weather[0].description;
            const humidity = data.main.humidity;
            const wind = Math.round(data.wind.speed * 3.6); // Konwersja na km/h
            const isRaining = data.weather[0].main.toLowerCase() === 'rain';
            const isAlert = wind > 70 || temp > 35 || temp < -15; // Przykładowe parametry alertu

            // Renderowanie kafelków z dynamicznymi klasami (animacje)
            dashboard.innerHTML = `
                <div class="tile">
                    <div class="tile-title">Lokalizacja</div>
                    <div class="tile-value" style="font-size: 2rem;">${data.name}</div>
                    <div style="color: var(--text-muted);">Polska</div>
                </div>

                <div class="tile">
                    <div class="tile-title">Temperatura</div>
                    <div class="tile-value">${temp}°C</div>
                    <div style="color: var(--text-muted); text-transform: capitalize;">${description}</div>
                </div>

                <div class="tile ${isRaining ? 'rain-active' : ''}">
                    <div class="tile-title">Wilgotność / Opad</div>
                    <div class="tile-value">${humidity}%</div>
                    <div style="color: var(--text-muted);">${isRaining ? 'Trwają opady za oknem' : 'Brak opadów'}</div>
                </div>

                <div class="tile ${isAlert ? 'alert-active' : ''}">
                    <div class="tile-title">Wiatr</div>
                    <div class="tile-value">${wind} km/h</div>
                    <div style="color: var(--alert); font-weight: bold; display: ${isAlert ? 'block' : 'none'};">
                        ⚠️ ALERT POGODOWY
                    </div>
                </div>
            `;
        }

        // Automatyczne odświeżanie danych co 10 minut (600 000 ms), aby pokazywać to, co za oknem
        setInterval(() => {
            if(document.getElementById('cityInput').value.trim() !== "") {
                fetchWeatherData();
            }
        }, 600000);

    </script>
</body>
</html>
