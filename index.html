<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO | Projekt: Piotrek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #dbeafe;
            --glass: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-orange: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(160deg, #bae6fd 0%, #dbeafe 50%, #fdf4ff 100%);
            background-color: var(--bg-color);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        /* GŁÓWNY MODUŁ */
        .main-weather { text-align: center; padding: 30px 20px; }
        .header-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
        .big-temp { font-size: 6.5rem; font-weight: 800; line-height: 1; margin: 15px 0; color: var(--text-dark); letter-spacing: -4px; }
        .condition { font-size: 1.4rem; font-weight: 600; color: var(--accent-blue); }

        /* PROGNOZA GODZINOWA - SCROLLOWANA */
        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 10px;
        }
        /* Ukrycie scrollbara dla estetyki */
        .hourly-container::-webkit-scrollbar { display: none; }
        
        .hour-item {
            min-width: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 12px 5px;
            border-radius: 20px;
        }
        .hour-time { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
        .hour-val { font-size: 1.1rem; font-weight: 800; }

        /* PROGNOZA 5 DNI */
        .daily-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .daily-row:last-child { border-bottom: none; }
        .day-name { width: 80px; font-weight: 600; }
        .day-icon { font-size: 1.3rem; }
        .day-temp-range { font-weight: 700; font-size: 0.95rem; }

        /* WSKAZÓWKA PIOTRKA */
        .peters-tip {
            display: flex; gap: 15px; align-items: center;
            border-left: 5px solid var(--accent-orange);
        }
        .avatar { font-size: 2rem; background: #fff; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tip-text h4 { font-size: 0.75rem; color: var(--accent-orange); text-transform: uppercase; margin-bottom: 3px; }
        .tip-text p { font-size: 0.95rem; line-height: 1.4; font-weight: 500; }

        /* BIO - HISTORIA */
        .history-card { background: #0f172a; color: #f8fafc; padding: 30px; }
        .history-card h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; }
        .history-card p { font-size: 1rem; line-height: 1.7; font-weight: 300; color: #cbd5e1; }
        .history-card strong { color: #fbbf24; }

        .label-small { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 15px; display: block; }
    </style>
</head>
