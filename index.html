<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO - Wyszków Meteo Engine</title>
    <style>
        /* STYLIZACJA PREMIUM SKYCAST PRO */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-orange: #ff7b00;
            --neon-red: #ff3333;
            --green: #10b981;
            --blue: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; margin-top: 10px; }
        
        .main-hero { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 20px; }
        #cityName { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        #mainIcon { font-size: 4rem; margin: 15px 0; }
        #valT { font-size: 3.5rem; font-weight: 800; color: var(--text-main); }
        #valD { font-size: 1.2rem; color: var(--text-muted); }

        #regionalAlertCard { border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        #atmCard { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; font-weight: 600; }
        #alert24hCard { background: linear-gradient(135deg, #cc1111 0%, #880000 100%); border: 2px solid var(--neon-red); border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center; }
        #thesisWidget { background: rgba(15, 23, 42, 0.5); border-left: 4px solid var(--neon-orange); border-radius: 8px; padding: 15px; margin-bottom: 20px; font-style: italic; }
        
        #hourlyCard, #dailyCard { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        #hList { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .h-box { min-width: 70px; text-align: center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        
        .d-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .d-row:last-child { border-bottom: none; }
        .d-day { font-weight: 600; width: 110px; }
        .d-icon { font-size: 1.5rem; }
        .d-temp { font-weight: 700; }
    </style>
</head>
   <body>
    <div class="container">

        <input type="text" id="cityIn" value="Wyszków" style="display: none;">

        <div class="main-hero">
            <h2 id="cityName">Pobieranie...</h2>
            <div id="mainIcon">☁️</div>
            <div id="valT">--°</div>
            <div id="valD">Inicjalizacja systemu...</div>
        </div>

        <div id="regionalAlertCard" style="display: none;">
            <h3 id="regAlertTitle"></h3>
            <p id="regAlertText"></p>
        </div>

        <div id="atmCard" style="display: none;">
            <div>💨 <span id="valWind">--</span> km/h</div>
            <div>🧭 <span id="valPress">--</span> hPa</div>
            <div>🍃 <span id="valAqi">--</span> <span id="aqiIcon"></span></div>
        </div>

        <div id="alert24hCard" style="display: none; color: white;">
            <div id="alert24hIcon" style="font-size: 2rem; margin-bottom: 5px;"></div>
            <div id="alert24hText" style="font-weight: 800;"></div>
            <div id="alert24hTime" style="font-size: 0.9rem; margin-top: 5px; opacity: 0.9;"></div>
        </div>

        <div id="thesisWidget" style="display: none;">
            <p id="thesisP"></p>
        </div>

        <div id="hourlyCard" style="display: none;">
            <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: var(--text-muted);">PROGNOZA GODZINOWA</h3>
            <div id="hList"></div>
        </div>

        <div id="dailyCard" style="display: none;">
            <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: var(--text-muted);">PROGNOZA 5-DNIOWA</h3>
            <div id="dList"></div>
        </div>

    </div>
        <script>
        // 1. TŁUMACZ KODÓW METEO
        function tlumaczPogode(code, isNight) {
            let desc = "Nieznana";
            let icon = "☁️";
            if (code === 0) { desc = "Czyste niebo"; icon = isNight ? "🌙" : "☀️"; }
            else if (code === 1 || code === 2) { desc = "Częściowe zachmurzenie"; icon = isNight ? "☁️" : "⛅"; }
            else if (code === 3) { desc = "Pochmurno"; icon = "☁️"; }
            else if (code === 45 || code === 48) { desc = "Mgła"; icon = "🌫️"; }
            else if (code >= 51 && code <= 55) { desc = "Mżawka"; icon = "🌧️"; }
            else if (code >= 61 && code <= 65) { desc = "Deszcz"; icon = "🌧️"; }
            else if (code >= 71 && code <= 77) { desc = "Śnieg"; icon = "❄️"; }
            else if (code >= 80 && code <= 82) { desc = "Ulewa"; icon = "🌧️"; }
            else if (code >= 95) { desc = "Burza"; icon = "⚡"; }
            return { desc: desc, icon: `<span>${icon}</span>` };
        }

        // 2. MONITOR JAKOŚCI POWIETRZA (AQI)
        function ocenaPowietrza(aqi) {
            if (aqi <= 20) return { tekst: "Bardzo Dobra", ikona: "🟢", kolor: "var(--green)" };
            if (aqi <= 40) return { tekst: "Dobra", ikona: "🟡", kolor: "#84cc16" };
            if (aqi <= 60) return { tekst: "Umiarkowana", ikona: "🟠", kolor: "var(--orange)" };
            if (aqi <= 80) return { tekst: "Zła", ikona: "🔴", kolor: "var(--red)" };
            return { tekst: "Fatalna!", ikona: "🟤", kolor: "#7f1d1d" };
        }

        // 3. SILNIK ASYNCHRONICZNY (SATELITA OPEN-METEO)
        async function pobierzDane() {
            let miastoInput = document.getElementById('cityIn').value.trim();
            if(!miastoInput) return;

            document.getElementById('regionalAlertCard').style.display = 'none';
            document.getElementById('atmCard').style.display = 'none';
            document.getElementById('alert24hCard').style.display = 'none';
            document.getElementById('valD').innerText = "Analiza... (Geokodowanie)";

            try {
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(miastoInput)}&count=1&language=pl&format=json`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();

                if (!geoData.results || geoData.results.length === 0) {
                    document.getElementById('valD').innerText = "Błąd: Miasto nieodnalezione.";
                    return;
                }

                const lat = geoData.results[0].latitude;
                const lon = geoData.results[0].longitude;
                const nazwaMiasta = geoData.results[0].name;

                document.getElementById('valD').innerText = "Pobieranie Danych...";

                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,surface_pressure,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
                const weatherRes = await fetch(weatherUrl);
                const weatherData = await weatherRes.json();

                let aqiData = null;
                try {
                    const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi`;
                    const aqiRes = await fetch(aqiUrl);
                    aqiData = await aqiRes.json();
                } catch(e) { }

                renderUI(weatherData, aqiData, nazwaMiasta);

            } catch (err) {
                document.getElementById('valD').innerText = "Błąd połączenia z satelitą.";
            }
        }
                // 4. GENERATOR INTERFEJSU (WLEWANIE PRĄDU)
        function renderUI(data, aqiData, nazwaMiasta) {
            const currentHour = new Date().getHours();
            const isNight = currentHour >= 20 || currentHour < 6;
            
            if (isNight) document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');

            const teraz = data.current;
            const pogodaTeraz = tlumaczPogode(teraz.weather_code, isNight);
            
            document.getElementById('cityName').innerText = nazwaMiasta;
            document.getElementById('valT').innerText = `${Math.round(teraz.temperature_2m)}°`;
            document.getElementById('mainIcon').innerHTML = pogodaTeraz.icon;
            document.getElementById('valD').innerText = pogodaTeraz.desc;

            document.getElementById('atmCard').style.display = 'flex';
            document.getElementById('valWind').innerText = Math.round(teraz.wind_speed_10m);
            document.getElementById('valPress').innerText = Math.round(teraz.surface_pressure);
            
            if (aqiData && aqiData.current) {
                const stanPowietrza = ocenaPowietrza(aqiData.current.european_aqi);
                document.getElementById('valAqi').innerText = stanPowietrza.tekst;
                document.getElementById('valAqi').style.color = stanPowietrza.kolor;
                document.getElementById('aqiIcon').innerText = stanPowietrza.ikona;
            }

            const wiatrKm = Math.round(teraz.wind_speed_10m);
            const regCard = document.getElementById('regionalAlertCard');
            const regTitle = document.getElementById('regAlertTitle');
            const regText = document.getElementById('regAlertText');
            regCard.style.display = "block";

            if (wiatrKm > 40 || teraz.weather_code >= 95) {
                regCard.style.borderLeft = "6px solid var(--neon-red)";
                regCard.style.background = "rgba(239, 68, 68, 0.05)";
                regTitle.style.color = "var(--neon-red)";
                regTitle.innerHTML = `⚠️ ALARM METEO: ${nazwaMiasta.toUpperCase()}`;
                regText.innerText = `Wykryto trudne warunki (Wiatr: ${wiatrKm} km/h). Zalecana ostrożność.`;
            } else {
                regCard.style.borderLeft = "6px solid var(--green)";
                regCard.style.background = "rgba(22, 163, 74, 0.05)";
                regTitle.style.color = "var(--green)";
                regTitle.innerHTML = `✅ STATUS: BEZPIECZNIE`;
                regText.innerText = `Warunki stabilne. Brak aktywnych zagrożeń pogodowych.`;
            }

            let indexGodziny = 0;
            try {
                if (data.hourly && data.hourly.time) {
                    const czasT = new Date().toISOString().slice(0, 14) + "00";
                    let foundIndex = data.hourly.time.findIndex(t => t >= czasT);
                    if (foundIndex !== -1) indexGodziny = foundIndex;
                }
            } catch(e) { console.error(e); }

            try {
                let wykrytoZagrozenie = false;
                let ikonaZagrozenia = "";
                let tekstZagrozenia = "";
                let czasZagrozenia = "";

                if (data.hourly && data.hourly.time && data.hourly.weather_code) {
                    for(let i = 0; i < 24; i++) {
                        const idx = indexGodziny + i;
                        if(idx < data.hourly.time.length) {
                            const kodPrzyszly = data.hourly.weather_code[idx];
                            
                            if(kodPrzyszly >= 95) {
                                wykrytoZagrozenie = true;
                                ikonaZagrozenia = "⚡⛈️";
                                tekstZagrozenia = "BURZA Z PIORUNAMI";
                                czasZagrozenia = data.hourly.time[idx].slice(11, 16);
                                break;
                            } else if(kodPrzyszly === 65 || kodPrzyszly === 82) {
                                wykrytoZagrozenie = true;
                                ikonaZagrozenia = "🌧️🌊";
                                tekstZagrozenia = "POTĘŻNA ULEWA";
                                czasZagrozenia = data.hourly.time[idx].slice(11, 16);
                            }
                        }
                    }
                }

                const tabliczka24h = document.getElementById('alert24hCard');
                if(wykrytoZagrozenie) {
                    tabliczka24h.style.display = 'block';
                    document.getElementById('alert24hIcon').innerText = ikonaZagrozenia;
                    document.getElementById('alert24hText').innerText = tekstZagrozenia;
                    document.getElementById('alert24hTime').innerText = "Spodziewane uderzenie: " + czasZagrozenia;
                } else {
                    tabliczka24h.style.display = 'none';
                }

                const widget = document.getElementById('thesisWidget');
                if (widget) widget.style.display = 'block';
                
                let mysl = "Pochmurno, stabilnie, bez szału. Idealny dzień na dobrą kawę, ulubioną muzykę i spokojne popołudnie. ☁️☕";
                
                if (teraz.temperature_2m > 34) {
                    mysl = "Gorąco jak przy piecu szamotowym! Pamiętajcie o piciu mnóstwa wody, żeby zachować energię i dobrze się nawodnić! 💧🔥🍕";
                } else if (teraz.temperature_2m > 25) {
                    mysl = "Słońce świeci na maksa! Piękna pogoda, więc uciekajcie na zewnątrz, złapcie trochę witaminy D i cieszcie się tym dniem! ☀️😎";
                } else if (teraz.temperature_2m < 5) {
                    mysl = "Zimno, że aż tnie! Ubierzcie się konkretnie, złapcie coś ciepłego do picia i dbajcie o zdrowie, żeby nie zmarznąć. 🥶☕";
                } else if (teraz.weather_code >= 51 && teraz.weather_code <= 65) {
                    mysl = "Leje od samego rana. Idealna wymówka, żeby zostać w domu, odpalić dobrą muzykę na słuchawkach, zrobić sobie mocną kawę i po prostu złapać luz! ☕🌧️";
                } else if (teraz.weather_code <= 2 && isNight) {
                    mysl = "Czyste niebo i piękny księżyc w pełnej krasie. Idealny moment na relaksujący wieczór, dobre melodyjne brzmienia i spacer, żeby przewietrzyć głowę. 🌙🎧✨";
                }
                
                document.getElementById('thesisP').innerText = mysl;

            } catch (e) { console.error(e); }

            try {
                if (data.hourly && data.hourly.time) {
                    document.getElementById('hourlyCard').style.display = 'block';
                    const hL = document.getElementById('hList'); 
                    hL.innerHTML = '';

                    for(let i=0; i<8; i++) {
                        const idx = indexGodziny + i;
                        if(idx < data.hourly.time.length) {
                            const czas = data.hourly.time[idx].slice(11, 16);
                            const temp = Math.round(data.hourly.temperature_2m[idx]);
                            const kod = data.hourly.weather_code[idx];
                            const noc = parseInt(czas.substring(0, 2)) >= 20 || parseInt(czas.substring(0, 2)) < 6;
                            const ikona = tlumaczPogode(kod, noc).icon;

                            hL.innerHTML += `
                                <div class="h-box">
                                    <div style="font-size: 0.8rem; font-weight: 700;">${czas}</div>
                                    <div style="font-size: 1.8rem; margin: 5px 0;">${ikona}</div>
                                    <div style="font-size: 1.1rem; font-weight: 900; color: var(--blue);">${temp}°</div>
                                </div>`;
                        }
                    }
                }
            } catch (e) { console.error(e); }

            try {
                if (data.daily && data.daily.time) {
                    document.getElementById('dailyCard').style.display = 'block';
                    const dL = document.getElementById('dList');
                    dL.innerHTML = '';
                    
                    const dniTygodnia = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
                    
                    for(let i=1; i<6; i++) { 
                        if(i < data.daily.time.length) {
                            const dataDnia = new Date(data.daily.time[i]);
                            const tMax = Math.round(data.daily.temperature_2m_max[i]);
                            const tMin = Math.round(data.daily.temperature_2m_min[i]);
                            // PROGNOZA 5-DNIOWA: Używa już poprawnego indeksu [i]!
                            const ikona = tlumaczPogode(data.daily.weather_code[i], false).icon;

                            dL.innerHTML += `
                                <div class="d-row">
                                    <div class="d-day">${dniTygodnia[dataDnia.getDay()]}</div>
                                    <div class="d-icon">${ikona}</div>
                                    <div class="d-temp">${tMax}° <span style="color: var(--text-muted); font-size: 1rem; font-weight: 400;">/ ${tMin}°</span></div>
                                </div>`;
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        // 5. AUTOMATYCZNY STRZAŁ STARTOWY Z ALERTEM O OTWARCIU STRONY
        window.onload = function() {
            pobierzDane();
            alert("⚠️ ALARM METEO: EKSTREMALNA FALA UPAŁÓW!\n\nSatelity Open-Meteo potwierdzają nadejście ekstremalnej fali upałów. Temperatury w Krakowie i okolicach skoczą do 32°C!\n\nDbajcie o nawodnienie, unikajcie słońca w południe i śledźcie radar zagrożeń SkyCast PRO.\n\nZaryglujcie okna i dbajcie o siebie! 💧☀️🛡️");
        };
    </script>
</body>
</html>
