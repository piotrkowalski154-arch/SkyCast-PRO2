<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO - Logic Fix V5.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { background: linear-gradient(180deg, #F0F9FF 0%, #FFFFFF 100%); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .b44-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.03); }
        .btn-blue { background-color: #8BB8F8; color: white; border-radius: 1rem; transition: all 0.3s; }
        .btn-loading { background-color: #cbd5e1; cursor: wait; }
    </style>
</head>
<body class="flex flex-col items-center p-4 pb-12">

    <header class="text-center mt-6 mb-8 w-full max-w-md">
        <div class="text-5xl mb-2">☀️</div>
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter">SkyCast <span class="text-blue-500">PRO</span></h1>
        <p id="status-line" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">System Gotowy</p>
    </header>

    <div class="w-full max-w-md mb-6">
        <input id="city-input" type="text" placeholder="Wpisz Bochnia, Brzesko..." class="w-full p-4 b44-card text-slate-800 font-semibold outline-none focus:ring-2 focus:ring-blue-300 mb-3">
        <button id="search-btn" onclick="searchManual()" class="w-full btn-blue font-bold py-4 rounded-xl uppercase text-sm shadow-md active:scale-95">
            SYNCHRONIZUJ DANE 📡
        </button>
    </div>

    <div class="w-full max-w-md b44-card p-6 mb-6 text-center">
        <div id="location-display" class="text-xs font-black text-blue-500 uppercase mb-4 tracking-tighter italic">Lokalizowanie...</div>
        <div class="flex justify-center items-start mb-2">
            <span id="temp" class="text-7xl font-black text-slate-900">--</span>
            <span class="text-3xl font-bold text-slate-500 mt-2">°C</span>
        </div>
        <div id="desc" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Czekam na sygnał</div>
    </div>

    <div class="w-full max-w-md grid grid-cols-2 gap-4 mb-6">
        <div class="b44-card p-5">
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Opady</p>
            <p id="precip-val" class="text-xl font-black text-slate-800">-- mm</p>
        </div>
        <div class="b44-card p-5">
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Wiatr</p>
            <p id="wind-val" class="text-xl font-black text-slate-800">-- km/h</p>
        </div>
    </div>

    <script>
        async function fetchWeather(lat, lon, name) {
            const btn = document.getElementById('search-btn');
            const status = document.getElementById('status-line');
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weather_code,precipitation&timezone=auto`);
                const data = await res.json();
                
                document.getElementById('temp').innerText = Math.round(data.current.temperature_2m);
                document.getElementById('location-display').innerText = name;
                document.getElementById('precip-val').innerText = data.current.precipitation + " mm";
                document.getElementById('wind-val').innerText = Math.round(data.current.wind_speed_10m) + " km/h";
                document.getElementById('desc').innerText = "Dane zaktualizowane";
                
                // Przywróć przycisk
                btn.innerText = "SYNCHRONIZUJ DANE 📡";
                btn.classList.remove('btn-loading');
                status.innerText = "Połączono z satelitą";

            } catch (e) { 
                btn.innerText = "BŁĄD POŁĄCZENIA";
            }
        }

        async function searchManual() {
            const city = document.getElementById('city-input').value;
            if(!city) return;

            const btn = document.getElementById('search-btn');
            btn.innerText = "ŁĄCZĘ Z SATELITĄ... ⏳";
            btn.classList.add('btn-loading');

            try {
                // FIX BRZESKA: Pobieramy 10 wyników zamiast 1
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=10&language=pl&format=json`);
                const geoData = await geoRes.json();
                
                if(geoData.results) {
                    // SORTOWANIE: Wybierz to miasto, które ma największą populację (Brzesko > Nowe Brzesko)
                    geoData.results.sort((a, b) => (b.population || 0) - (a.population || 0));
                    const best = geoData.results[0];
                    fetchWeather(best.latitude, best.longitude, best.name + ", " + best.country);
                }
            } catch (e) { btn.innerText = "BŁĄD LOKALIZACJI"; }
        }

        window.onload = () => {
            fetchWeather(50.06, 19.94, "Kraków, Polska");
        };
    </script>
</body>
</html>
